<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home page</title>
    <link href="../css/style_home.css" rel="stylesheet">
</head>
    <body>
        <div>
        <nav class="menu-bar">
            <a href="#" class="menu-bar__button" title="Home Active">
                <img src="../item/mi_home_active.png" width="40" height="40" alt="Home Active">
            </a>
            <a href="#" class="menu-bar__button" title="Person">
                <img src="../item/menu_item_person.png" width="40" height="40" alt="Person">

                    <p class="post-user__count-photo-text"> 1/3 </p>
                </div>
                <img src="../images/post_photo/snow_street_and_man.png" class="post-user__photo" alt="User photo">
                <button class="post-user__button-photo left">
                    <img src="../item/button_left.png" width="10" height="10" alt="Arrow left">
                </button>
                <button class="post-user__button-photo right">
                    <img src="../item/button_right.png" width="10" height="10" alt="Arrow right">
                </button>
                <button class="post-user__like">
                    <img src="../item/like.png" class="post-user__like-photo" alt="Like" > 243

                    Так красиво сегодня на улице! Настоящая зима))

                    в гор...
                </p>
                <a class="post-user__more"> ещё </a>

            </div>
                <div class="post-user__header">
                    <img src="../images/avatar/avatar_liza.png" class="header__avatar" alt="Avatar user">
                    <p class="header__name">Лиза Дёмина</p>
                </div>
                <img src="../images/post_photo/paper_and_flowers.jpg" class="post-user__photo" alt="User photo">
                <button class="post-user__like">
                    <img src="../item/like.png" class="post-user__like-photo" alt="like"> 534 </button>
                <p class="post-user__text">
                </p>
                <a class="post-user__more"> </a>
                <p class="post-user__time"> 1 день назад </p>
            </div>
        </div>
