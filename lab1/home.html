<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home page</title>
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <div class = "menu-bar">
        <img src = "item/mi_home_active.png" width="40" height="40">
        <img src = "item/menu_item_person.png" width="40" height="40">
        <img src = "item/menu_item_add.png" width="40" height="40">
    </div>
    <div class = "main-feed">
        <div class = "post-user">
            <div class = "post-user__header">
                <img src = "images/avatar/avatar_vanya.png" class="header__avatar" alt = "Avatar user">
                <p class="header__name">Ваня Денисов</p>
                <img src="item/item_edit.png" width="24" height="24" style="margin-left: 320px;">
            </div>

            <div class = "post-user__count-photo">
                <p class = "post-user__count-photo-text"> 1/3 </p>
            </div>

            <img src = "images/post_photo/snow_street_and_man.png" class="post-user__photo" alt = "User photo">
            <img src = "item/slider_button_left.png" width="20" height="20" alt ="arrow left">
            <img src = "item/slider_button_right.png" width="20" height="20" alt ="arrow right">

            <div class="post-user__like">
                <img src = "item/like.png" width="16" height="16" alt = "like">
                <p class = 'post-user__like-count'>243</p>
            </div>

            <p class = 'post-user__text'>
                Так красиво сегодня на улице! Настоящая зима))
                Вспоминается Бродский: «Поздно ночью, в уснувшей долине, на самом дне,
                в гор...
            </p>
            <p class="post-user__more"> ещё </p>
            <p class="post-user__time"> 2 часа назад </p>
        </div>

        <div class = "post-user">
            <div class = "post-user__header">
                <img src = "images/avatar/avatar_liza.png" class = "header__avatar" alt = "Avatar user">
                <p class = "header__name">Лиза Дёмина</p>
            </div>

            <img src = "images/post_photo/paper_and_flowers.jpg" class="post-user__photo" alt = "User photo">
            <div class="post-user__like">
                <img src = "item/like.png" width="16" height="16" alt = "like">
                <p class = 'post-user__like-count'>534</p>
            </div>
            <p class = 'post-user__text'>
            </p>
            <p class="post-user__more"> </p>
            <p class="post-user__time"> 1 день назад </p>
        </div>


    </div>
</body>
</html>
