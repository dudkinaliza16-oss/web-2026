<!DOCTYPE html>
<html><head>
    <title>Login</title>
    <meta charset="UTF-8">
    <link href="style.css" rel="stylesheet">
</head>
<body>

<div class="left_area">
    <h1 class="title">Войти</h1>
    <img src="images/smile_man.png" width="462" height="501">
</div>
<div class="input_area">
    <form action="#">

        <p class="lable_input">Электропочта</p>
        <input type="email" name="user_email" class="input-field">
        <p class="hint_input">Введите электропочту в формате *****@***.**</p>
        <p class="lable_input">Пароль</p>
        <input type="password" name="user_password" class="input-field" placeholder="">
        <input type="submit" name="submit" class="button" value="Продолжить">

    </form>

</div>


</body></html>
