<!DOCTYPE html>
<html><head>
    <title>Login page</title>
    <meta charset="UTF-8">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <h1 class="text-entry">Войти</h1>
    <img src="images/smile_man.png" width="462" height="501">
<div class="author-field">
    <form action="#">
        <p class="author-field__text">Электропочта</p>
        <input type="email" name="user_email" class="author-field__input">
        <p class="author-field__help-block" style="margin-top: 5px;">
            Введите электропочту в формате *****@***.**</p>
        <p class="author-field__text">Пароль</p>
        <input type="password" name="user_password" class="author-field__input" placeholder="">
        <img src="item/item-eye-off.png" width="22" height="22">
        <input type="submit" name="submit" class="author-field__button-continue" value="Продолжить">

    </form>

</div>


</body></html>
